<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeanOS — Manage Inventory</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <h1>LeanOS</h1>
            <p class="subtitle">Inventory Setup, Receipts & Adjustments</p>
            <p class="version-stamp">v3.1.15</p>
        </div>

        <div class="topbar-actions">
            <div class="sync-compact">
                <span id="syncStatus" class="sync-inline muted">Loading cloud data...</span>
            </div>

            <div class="menu-wrap">
                <button id="menuToggleButton" type="button" class="menu-toggle">☰ Menu</button>

                <div id="topMenu" class="top-menu hidden">
                    <a class="menu-link" href="index.html">Dashboard</a>
                    <a class="menu-link" href="jobs.html">Jobs</a>
                    <a class="menu-link" href="inventory.html">Inventory</a>
                    <a class="menu-link active" href="manage-inventory.html">Manage Inventory</a>
                    <a class="menu-link" href="transactions.html">Transactions</a>

                    <div class="menu-divider"></div>

                    <<button id="exportDataButton" type="button" class="menu-action">Export Backup</button>

                    <label class="menu-file-button">
                        Import Backup
                        <input id="importDataInput" type="file" accept="application/json" />
                    </label>

                    <button id="useCloudVersionButton" type="button" class="menu-action">Use Cloud Version</button>
                </div>
            </div>
        </div>
    </header>

    <main class="page">
        <div class="grid-two">
            <section class="card">
                <h2>Record Receipt</h2>
                <div class="form-stack">
                    <input
                        id="receiptItemSearch"
                        list="receiptItemDatalist"
                        placeholder="Search item by name, group, or item ID"
                    />
                    <datalist id="receiptItemDatalist"></datalist>

                    <input id="receiptQty" type="number" step="any" placeholder="Qty received" />
                    <button id="receiveInventoryButton">Record Receipt</button>
                </div>
            </section>

            <section class="card">
                <h2>Manual Adjustment</h2>
                <div class="form-stack">
                    <input
                        id="adjustItemSearch"
                        list="adjustItemDatalist"
                        placeholder="Search item by name, group, or item ID"
                    />
                    <datalist id="adjustItemDatalist"></datalist>

                    <input id="adjustQty" type="number" step="any" placeholder="Adjustment (+ or -)" />
                    <input id="adjustNote" placeholder="Reason / note" />
                    <button id="adjustInventoryButton">Apply Adjustment</button>
                </div>
            </section>
        </div>

        <section class="card">
            <div class="section-header-with-action">
                <h2>Current Inventory Snapshot</h2>

                <div class="form-row">
                    <button id="openAddInventoryModalButton" type="button" class="open-action-button">+ Add Item</button>
                    <button id="toggleInventorySnapshotButton" type="button" class="toggle-button">Collapse</button>
                </div>
            </div>

            <div id="inventorySnapshotContent">
                <div class="form-row">
                    <input id="inventorySearchInput" placeholder="Search group, item, or item ID" />
                </div>
                <div id="inventoryList"></div>
            </div>
        </section>
    </main>

    <div id="addInventoryModal" class="modal-backdrop hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Add Inventory Item</h2>
                <button id="closeAddInventoryModalButton" type="button" class="ghost-button">Close</button>
            </div>

            <div class="form-stack">
                <input id="inventoryGroup" placeholder="Material group (ex: Foamboard)" />
                <input id="inventoryName" placeholder="Specific item name" />
                <input id="inventoryCode" placeholder="Item ID / SKU" />
                <input id="inventoryUnit" placeholder="Unit (roll, ft, sheet, etc.)" />
                <input id="inventoryThreshold" type="number" step="any" placeholder="Reorder threshold" />
                <button id="addInventoryButton">Add Inventory Item</button>
            </div>
        </div>
    </div>

    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
