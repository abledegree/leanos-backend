<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeanOS — Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <h1>LeanOS</h1>
            <p class="subtitle">Dashboard</p>
            <p class="version-stamp">v3.1.15</p>
        </div>

        <div class="topbar-actions">
            <div class="sync-compact">
                <span id="syncStatus" class="sync-inline muted">Loading cloud data...</span>
            </div>

            <div class="menu-wrap">
                <button id="menuToggleButton" type="button" class="menu-toggle">☰ Menu</button>

                <div id="topMenu" class="top-menu hidden">
                    <a class="menu-link active" href="index.html">Dashboard</a>
                    <a class="menu-link" href="jobs.html">Jobs</a>
                    <a class="menu-link" href="inventory.html">Inventory</a>
                    <a class="menu-link" href="manage-inventory.html">Manage Inventory</a>
                    <a class="menu-link" href="transactions.html">Transactions</a>

                    <div class="menu-divider"></div>

                    <button id="exportDataButton" type="button" class="menu-action">Export Backup</button>

                    <label class="menu-file-button">
                        Import Backup
                        <input id="importDataInput" type="file" accept="application/json" />
                    </label>

                    <button id="useCloudVersionButton" type="button" class="menu-action">Use Cloud Version</button>
                </div>
            </div>
        </div>
    </header>

    <main class="page">
        <section class="card">
            <h2>Quick Navigation</h2>
            <div class="form-row">
                <a class="nav-link" href="jobs.html">Go to Jobs</a>
                <a class="nav-link" href="inventory.html">Go to Inventory</a>
                <a class="nav-link" href="manage-inventory.html">Go to Receipts / Item Setup</a>
                <a class="nav-link" href="transactions.html">Go to Transactions</a>
            </div>
        </section>

        <section class="card">
            <h2>Stats</h2>
            <div id="dashboardStats"></div>
        </section>

        <section class="card">
            <div class="section-header-with-action">
                <h2>Reorder Notices</h2>
                <button id="toggleDashboardReordersButton" type="button" class="toggle-button">Collapse</button>
            </div>
            <div id="dashboardReordersContent">
                <div id="dashboardReorders"></div>
            </div>
        </section>

        <section class="card">
            <div class="section-header-with-action">
                <h2>Most Used Materials</h2>
                <button id="toggleDashboardMaterialsButton" type="button" class="toggle-button">Collapse</button>
            </div>
            <div id="dashboardMaterialsContent">
                <div id="dashboardMaterials"></div>
            </div>
        </section>
    </main>

    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
