<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeanOS — Jobs</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <h1>LeanOS</h1>
            <p class="subtitle">Jobs</p>
            <p class="version-stamp">v3.1.15</p>
        </div>

        <div class="topbar-actions">
            <div class="sync-compact">
                <span id="syncStatus" class="sync-inline muted">Loading cloud data...</span>
            </div>

            <div class="menu-wrap">
                <button id="menuToggleButton" type="button" class="menu-toggle">☰ Menu</button>

                <div id="topMenu" class="top-menu hidden">
                    <a class="menu-link" href="index.html">Dashboard</a>
                    <a class="menu-link active" href="jobs.html">Jobs</a>
                    <a class="menu-link" href="inventory.html">Inventory</a>
                    <a class="menu-link" href="manage-inventory.html">Manage Inventory</a>
                    <a class="menu-link" href="transactions.html">Transactions</a>

                    <div class="menu-divider"></div>

                   <button id="exportDataButton" type="button" class="menu-action">Export Backup</button>

                    <label class="menu-file-button">
                        Import Backup
                        <input id="importDataInput" type="file" accept="application/json" />
                    </label>

                    <button id="useCloudVersionButton" type="button" class="menu-action">Use Cloud Version</button>
                </div>
            </div>
        </div>
    </header>

    <main class="page">
        <section class="card">
            <h2>Start Job</h2>
            <div class="form-row">
                <input id="jobInput" placeholder="Enter Job Ticket" />
                <button id="startJobButton">Start Job</button>
            </div>
        </section>

        <section class="card">
            <h2>Job Search & Filter</h2>
            <div class="form-row">
                <input id="jobSearchInput" placeholder="Search ticket, item, item ID, date, notes, or status" />
                <select id="jobFilterSelect">
                    <option value="ALL">All Jobs</option>
                    <option value="OPEN">Open Jobs</option>
                    <option value="CLOSED">Closed Jobs</option>
                </select>
            </div>
        </section>

        <div class="grid-two">
            <section class="card">
                <div class="section-header-with-action">
                    <h2>Open Jobs</h2>
                    <button id="toggleOpenJobsButton" type="button" class="toggle-button">Collapse</button>
                </div>
                <div id="openJobSectionContent">
                    <div id="openJobList"></div>
                </div>
            </section>

            <section class="card">
                <div class="section-header-with-action">
                    <h2>Closed Jobs</h2>
                    <button id="toggleClosedJobsButton" type="button" class="toggle-button">Collapse</button>
                </div>
                <div id="closedJobSectionContent">
                    <div id="closedJobList"></div>
                </div>
            </section>
        </div>
    </main>

    <div id="jobEditModal" class="modal-backdrop hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Edit Job</h2>
                <button id="closeJobEditModalButton" type="button" class="ghost-button">Close</button>
            </div>

            <div class="form-stack">
                <input id="editJobTicketInput" placeholder="Job Ticket" />

                <div class="form-row">
                    <select id="editJobStatusSelect">
                        <option value="OPEN">Open</option>
                        <option value="CLOSED">Closed</option>
                    </select>
                    <input id="editJobStartedAtInput" type="datetime-local" />
                    <input id="editJobClosedAtInput" type="datetime-local" />
                </div>

                <div class="form-stack">
                    <label class="section-label">Materials On This Job</label>
                    <div id="editJobMaterialsList"></div>
                </div>

                <textarea id="editJobNotesInput" placeholder="Job notes"></textarea>

                <div class="form-row modal-actions">
                    <button id="saveJobEditButton" type="button">Save Job</button>
                    <button id="deleteJobFromModalButton" type="button" class="delete-btn">Delete Job</button>
                </div>
            </div>
        </div>
    </div>

    <div id="jobMaterialModal" class="modal-backdrop hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Add Material</h2>
                <button id="closeJobMaterialModalButton" type="button" class="ghost-button">Close</button>
            </div>

            <div class="form-stack">
                <div id="jobMaterialModalLabel" class="muted"></div>

                <div id="jobMaterialLines"></div>

                <div class="form-row">
                    <button id="addMaterialLineButton" type="button" class="ghost-button">+ Add Another Material</button>
                </div>

                <div class="form-row modal-actions">
                    <button id="saveJobMaterialButton" type="button">Save Materials</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
