<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeanOS — Transactions</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="topbar">
        <div class="brand-block">
            <h1>LeanOS</h1>
            <p class="subtitle">Transactions</p>
            <p class="version-stamp">v3.1.15</p>
        </div>

        <div class="topbar-actions">
            <div class="sync-compact">
                <span id="syncStatus" class="sync-inline muted">Loading cloud data...</span>
            </div>

            <div class="menu-wrap">
                <button id="menuToggleButton" type="button" class="menu-toggle">☰ Menu</button>

                <div id="topMenu" class="top-menu hidden">
                    <a class="menu-link" href="index.html">Dashboard</a>
                    <a class="menu-link" href="jobs.html">Jobs</a>
                    <a class="menu-link" href="inventory.html">Inventory</a>
                    <a class="menu-link" href="manage-inventory.html">Manage Inventory</a>
                    <a class="menu-link active" href="transactions.html">Transactions</a>

                    <div class="menu-divider"></div>

                    <button id="exportDataButton" type="button" class="menu-action">Export Backup</button>

                    <label class="menu-file-button">
                        Import Backup
                        <input id="importDataInput" type="file" accept="application/json" />
                    </label>

                    <button id="useCloudVersionButton" type="button" class="menu-action">Use Cloud Version</button>
                </div>
            </div>
        </div>
    </header>

    <main class="page">
        <section class="card">
            <h2>Transaction Log</h2>
            <div class="form-row">
                <input id="transactionSearchInput" placeholder="Search type, item, group, item ID, job, or note" />
            </div>
            <div id="transactionList"></div>
        </section>
    </main>

    <script src="js/dom.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/transactions.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/jobs.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
